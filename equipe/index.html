<span style={{fontSize:12,color:C.gold}}>{(STATUSES.find(s=>s.id===entry?.status)||STATUSES[0]).label}</span>

<h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown,margin:"0 0 20px"}}>{entry?.title}</h3>
{entry?.roteiro?<div style={{background:C.gl,borderRadius:12,padding:20,fontSize:13,lineHeight:1.8,color:C.brown,whiteSpace:"pre-wrap"}}>{entry.roteiro}</div>:<p style={{color:"#999",fontStyle:"italic"}}>Roteiro ainda não adicionado.</p>}
<div style={{marginTop:20}}><label style={lb}>Atualizar status</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{STATUSES.map(s=><button key={s.id} onClick={()=>{updateEntry(dk,entry.id,{status:s.id})}} style={{padding:"6px 14px",borderRadius:20,fontSize:11,border:"1.5px solid "+(entry?.status===s.id?s.color:C.gb),background:entry?.status===s.id?s.color+"15":"transparent",color:entry?.status===s.id?s.color:C.brown,cursor:"pointer",fontWeight:entry?.status===s.id?600:400}}>{s.label}</button>)}</div></div>
</div>)}
</div></div>)};

return(<div>
<div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Agenda Editorial</h2><p style={{color:C.gold,fontSize:12}}>Roteiros e calendário de conteúdo</p></div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
<div style={{display:"flex",gap:4,background:C.bg,borderRadius:8,padding:2}}><button onClick={()=>setView("month")} style={{padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:view==="month"?600:400,background:view==="month"?C.white:"transparent",color:view==="month"?C.brown:C.gold}}>Mês</button><button onClick={()=>setView("week")} style={{padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:view==="week"?600:400,background:view==="week"?C.white:"transparent",color:view==="week"?C.brown:C.gold}}>Semana</button></div>
{isConsultora&&view==="week"&&<button onClick={()=>{setAddKey(fmtKey(new Date()));setShowAdd(true)}} style={{...bs,fontSize:11}}>+ Novo roteiro</button>}
</div>

{view==="month"&&(<div>
<div style={{background:C.white,borderRadius:12,border:"1px solid "+C.gb,padding:18}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>mo===0?((setMo(11)),setYr(yr-1)):setMo(mo-1)} style={nb}>←</button><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:20,color:C.brown,margin:0}}>{MO[mo]} {yr}</h3><button onClick={()=>mo===11?((setMo(0)),setYr(yr+1)):setMo(mo+1)} style={nb}>→</button></div>
<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
{WD.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:C.gold,fontWeight:600,padding:"3px 0"}}>{d}</div>)}
{calDays.map((day,i)=>{const k=day?yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0"):null;const dayEntries=k?entries[k]||[]:[];const td=day&&new Date().getDate()===day&&new Date().getMonth()===mo&&new Date().getFullYear()===yr;
return(<div key={i} onClick={()=>{if(day&&dayEntries.length){setSelKey(k);setSelIdx(0)}else if(day&&isConsultora){setAddKey(k);setShowAdd(true)}}} style={{minHeight:60,borderRadius:6,fontSize:11,padding:3,background:td?"rgba(201,169,110,0.08)":"transparent",border:td?"1.5px solid "+C.gold:dayEntries.length?"1px solid "+C.gb:"1px solid transparent",cursor:day?"pointer":"default",overflow:"hidden"}}>
<div style={{color:day?C.brown:"transparent",fontSize:11,fontWeight:td?600:400,marginBottom:2}}>{day||""}</div>
{dayEntries.slice(0,2).map((e,j)=>{const ty=TYPES.find(t=>t.id===e.type)||TYPES[0];const st=STATUSES.find(s=>s.id===e.status)||STATUSES[0];return(<div key={j} style={{background:ty.color+"12",borderLeft:"2px solid "+ty.color,borderRadius:3,padding:"2px 4px",marginBottom:2,fontSize:9,color:C.brown,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>)})}
{dayEntries.length>2&&<div style={{fontSize:8,color:C.gold}}>+{dayEntries.length-2}</div>}
</div>)})}
</div></div>
</div>)}

{view==="week"&&(<div>
<div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
{weekDates.map((d,i)=>{const k=fmtKey(d);const dayEntries=entries[k]||[];const td=d.toDateString()===new Date().toDateString();
return(<div key={i} style={{background:C.white,borderRadius:10,border:td?"1.5px solid "+C.gold:"1px solid "+C.gb,padding:10,minHeight:200}}>
<div style={{textAlign:"center",marginBottom:10}}><div style={{fontSize:10,color:C.gold,fontWeight:600}}>{WD[i]}</div><div style={{fontSize:16,fontWeight:td?700:400,color:C.brown}}>{d.getDate()}</div><div style={{fontSize:9,color:"#999"}}>{MO[d.getMonth()].slice(0,3)}</div></div>
{dayEntries.map((e,j)=>{const ty=TYPES.find(t=>t.id===e.type)||TYPES[0];const st=STATUSES.find(s=>s.id===e.status)||STATUSES[0];
return(<div key={j} onClick={()=>{setSelKey(k);setSelIdx(j)}} style={{background:ty.color+"10",borderLeft:"3px solid "+ty.color,borderRadius:6,padding:8,marginBottom:6,cursor:"pointer"}}>
<div style={{fontSize:10,fontWeight:600,color:C.brown,marginBottom:3,lineHeight:1.3}}>{e.title}</div>
<div style={{display:"flex",gap:4,alignItems:"center"}}><span style={{fontSize:8,color:ty.color,fontWeight:600}}>{ty.label}</span><span style={{fontSize:8,color:st.color}}>· {st.label}</span></div>
</div>)})}
{isConsultora&&<button onClick={()=>{setAddKey(k);setShowAdd(true)}} style={{width:"100%",padding:"6px",borderRadius:6,border:"1px dashed "+C.gb,background:"transparent",cursor:"pointer",fontSize:10,color:C.gold,marginTop:4}}>+</button>}
</div>)})}
</div>
</div>)}

{selKey&&selEntry&&<CardModal dk={selKey} entry={selEntry} onClose={()=>{setSelKey(null);setSelIdx(null)}}/>}
{showAdd&&addKey&&<CardModal dk={addKey} entry={null} onClose={()=>{setShowAdd(false);setAddKey(null)}}/>}
</div>)}

function Login({onOk}){const[pw,sP]=useState("");const[er,sE]=useState(false);const go=()=>{if(pw===PW)onOk();else{sE(true);setTimeout(()=>sE(false),2000)}};return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:C.white,borderRadius:20,padding:"44px 32px",maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(44,36,22,0.1)"}}><h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:34,fontWeight:600,color:C.brown,margin:"0 0 4px"}}>M<span style={{color:C.gold}}>|</span>C</h1><p style={{fontSize:10,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:28}}>Painel Estratégico</p><input type="password" value={pw} onChange={e=>sP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Senha de acesso" style={{...ip,textAlign:"center",marginBottom:er?6:14}}/>{er&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<button onClick={go} style={{...bp,width:"100%"}}>Acessar</button></div></div>)}

function App(){
const[logged,setL]=useState(false);const[tab,setTab]=useState("plan");const[stratOk,setStrat]=useState(false);const[stratPw,setSPw]=useState("");const[stratErr,setSErr]=useState(false);const[showSM,setShowSM]=useState(false);
const[ct,sCt]=useState("stories");const[topic,sTo]=useState(TOPS[0]);const[cTo,sCTo]=useState("");const[extra,sEx]=useState("");
const[result,sR]=useState("");const[ld,sLd]=useState(false);const[cp,sCp]=useState(false);
const[saved,sSv]=useState(()=>sL("sv",[]));const[sn,sSN]=useState("");
const gen=async()=>{sLd(true);sR("");sCp(false);const c=CTS.find(x=>x.id===ct);const t=cTo.trim()||topic;let msg=c.pr+" sobre: \""+t+"\".";if(ct==="stories")msg+="\nSequência de telas com texto, formato e orientação visual.";if(ct==="legenda")msg+="\nTexto completo, CTA e 15-20 hashtags.";if(ct==="temas")msg+="\n5 temas com título, relevância e formato.";if(extra.trim())msg+="\n\n"+extra;try{const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sysPr,messages:[{role:"user",content:msg}]})});const d=await r.json();sR(d.content?.map(b=>b.text||"").join("\n")||"Erro.")}catch{sR("Erro de conexão.")}sLd(false)};
const handleTab=id=>{if(id==="growth"&&!stratOk){setShowSM(true);return}setTab(id)};
const tryStrat=()=>{if(stratPw===STRATPW){setStrat(true);setShowSM(false);setTab("growth");setSPw("")}else{setSErr(true);setTimeout(()=>setSErr(false),2000)}};
if(!logged)return <Login onOk={()=>setL(true)}/>;
const tabs=[{id:"growth",l:"Estratégia",lk:true},{id:"plan",l:"Planejamento"},{id:"gen",l:"Conteúdo"},{id:"sv",l:"Salvos"},{id:"cal",l:"Agenda"}];
return(<div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Jost',sans-serif"}}>
<div style={{background:C.white,borderBottom:"1px solid "+C.gb,padding:"14px 16px"}}><div style={{maxWidth:840,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div><h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,fontWeight:600,color:C.brown,margin:0}}>M<span style={{color:C.gold}}>|</span>C</h1><p style={{fontSize:9,color:C.gold,margin:0,letterSpacing:2,textTransform:"uppercase"}}>Painel Estratégico</p></div><div style={{display:"flex",gap:2,background:C.bg,borderRadius:9,padding:2,flexWrap:"wrap"}}>{tabs.map(t=><button key={t.id} onClick={()=>handleTab(t.id)} style={{padding:"6px 11px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?600:400,background:tab===t.id?C.white:"transparent",color:tab===t.id?C.brown:C.gold}}>{t.l}{t.lk&&!stratOk?" ◆":""}</button>)}</div></div></div>
<div style={{maxWidth:840,margin:"0 auto",padding:"18px 14px"}}>
{tab==="growth"&&<GrowthTab/>}
{tab==="plan"&&<PlanTab/>}
{tab==="gen"&&(<div>
<div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Gerador de Conteúdo</h2><p style={{color:C.gold,fontSize:12}}>Produção alinhada ao posicionamento da marca</p></div>
<label style={lb}>Formato</label><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>{CTS.map(c=><button key={c.id} onClick={()=>sCt(c.id)} style={{padding:"12px 6px",borderRadius:10,border:"1.5px solid "+(ct===c.id?C.gold:C.gb),background:ct===c.id?C.gl:C.white,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:11,fontWeight:500,color:C.brown}}>{c.label}</div></button>)}</div>
<label style={lb}>Tema</label><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{TOPS.map(t=><button key={t} onClick={()=>{sTo(t);sCTo("")}} style={{padding:"4px 10px",borderRadius:16,fontSize:10,border:"1px solid "+(topic===t&&!cTo?C.gold:C.gb),background:topic===t&&!cTo?C.gl:C.white,color:C.brown,cursor:"pointer"}}>{t}</button>)}</div>
<input value={cTo} onChange={e=>sCTo(e.target.value)} placeholder="Ou insira um tema específico..." style={ip}/>
<label style={lb}>Orientações adicionais</label><textarea value={extra} onChange={e=>sEx(e.target.value)} rows={2} placeholder="Contexto, direcionamento..." style={{...ip,resize:"vertical"}}/>
<button onClick={gen} disabled={ld} style={{...bp,width:"100%",opacity:ld?.7:1}}>{ld?"Gerando...":"Gerar conteúdo"}</button>
{result&&(<div style={{marginTop:16,background:C.white,borderRadius:12,border:"1px solid "+C.gb,padding:18}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:500,fontSize:13}}>Resultado</span><div style={{display:"flex",gap:4}}><button onClick={()=>{const c=CTS.find(x=>x.id===ct);const u=[{id:Date.now(),tl:c.label,tp:cTo.trim()||topic,tx:result,dt:new Date().toLocaleDateString("pt-BR")},...saved].slice(0,50);sSv(u);sS("sv",u);sSN("Salvo");setTimeout(()=>sSN(""),2000)}} style={bs}>{sn||"Salvar"}</button><button onClick={()=>{navigator.clipboard.writeText(result);sCp(true);setTimeout(()=>sCp(false),2000)}} style={bs}>{cp?"Copiado":"Copiar"}</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.7}}>{result}</div></div>)}
</div>)}
{tab==="sv"&&(<div>
<div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Conteúdos Salvos</h2></div>
{saved.length===0?<p style={{textAlign:"center",color:C.gold}}>Nenhum conteúdo salvo.</p>:saved.map(it=><div key={it.id} style={{background:C.white,borderRadius:10,border:"1px solid "+C.gb,padding:16,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:12}}>{it.tl} · {it.tp} · {it.dt}</span><div style={{display:"flex",gap:4}}><button onClick={()=>navigator.clipboard.writeText(it.tx)} style={bs}>Copiar</button><button onClick={()=>{const u=saved.filter(c=>c.id!==it.id);sSv(u);sS("sv",u)}} style={{...bs,color:"#c44"}}>Remover</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.5,maxHeight:160,overflow:"auto"}}>{it.tx}</div></div>)}
</div>)}
{tab==="cal"&&<AgendaTab isConsultora={stratOk}/>}
{showSM&&(<div style={{position:"fixed",inset:0,background:"rgba(44,36,22,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:C.white,borderRadius:16,padding:"36px 28px",maxWidth:360,width:"100%",textAlign:"center"}}><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:C.brown,margin:"0 0 6px"}}>Área restrita</h3><p style={{fontSize:13,color:C.gold,marginBottom:20}}>Acesso exclusivo da consultoria</p><input type="password" value={stratPw} onChange={e=>setSPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryStrat()} placeholder="Senha" style={{...ip,textAlign:"center",marginBottom:stratErr?6:14}}/>{stratErr&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<div style={{display:"flex",gap:8}}><button onClick={()=>{setShowSM(false);setSPw("");setSErr(false)}} style={{...bs,flex:1}}>Cancelar</button><button onClick={tryStrat} style={{...bp,flex:1}}>Acessar</button></div></div></div>)}
</div>
</div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
