/* Firebase helpers */
const fbCol=db.collection("agenda");
function useAgenda(){
  const[entries,setEntries]=useState({});
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const unsub=fbCol.onSnapshot(snap=>{
      const data={};
      snap.forEach(doc=>{data[doc.id]=doc.data().items||[]});
      setEntries(data);setLoading(false);
    });
    return ()=>unsub();
  },[]);
  const addEntry=async(key,entry)=>{
    const cur=entries[key]||[];
    const item={...entry,id:Date.now(),status:"roteirizado"};
    await fbCol.doc(key).set({items:[...cur,item]});
  };
  const updateEntry=async(key,id,updates)=>{
    const cur=(entries[key]||[]).map(e=>e.id===id?{...e,...updates}:e);
    await fbCol.doc(key).set({items:cur});
  };
  const deleteEntry=async(key,id)=>{
    const cur=(entries[key]||[]).filter(e=>e.id!==id);
    if(cur.length)await fbCol.doc(key).set({items:cur});
    else await fbCol.doc(key).delete();
  };
  return{entries,loading,addEntry,updateEntry,deleteEntry};
}

<label style={lb}>Tema</label><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{TOPS.map(t=><button key={t} onClick={()=>{sTo(t);sCTo("")}} style={{padding:"4px 10px",borderRadius:16,fontSize:10,border:"1px solid "+(topic===t&&!cTo?C.gold:C.gb),background:topic===t&&!cTo?C.gl:C.white,color:C.brown,cursor:"pointer"}}>{t}</button>)}</div>
<input value={cTo} onChange={e=>sCTo(e.target.value)} placeholder="Tema específico..." style={ip}/>
<label style={lb}>Orientações</label><textarea value={extra} onChange={e=>sEx(e.target.value)} rows={2} style={{...ip,resize:"vertical"}}/>
<button onClick={gen} disabled={ld} style={{...bp,width:"100%",opacity:ld?.7:1}}>{ld?"Gerando...":"Gerar conteúdo"}</button>
{result&&<div style={{marginTop:16,background:C.white,borderRadius:12,border:"1px solid "+C.gb,padding:18}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:500,fontSize:13}}>Resultado</span><div style={{display:"flex",gap:4}}><button onClick={()=>{const c=CTS.find(x=>x.id===ct);const u=[{id:Date.now(),tl:c.label,tp:cTo.trim()||topic,tx:result,dt:new Date().toLocaleDateString("pt-BR")},...saved].slice(0,50);sSv(u);sS("sv",u);sSN("Salvo");setTimeout(()=>sSN(""),2000)}} style={bs}>{sn||"Salvar"}</button><button onClick={()=>{navigator.clipboard.writeText(result);sCp(true);setTimeout(()=>sCp(false),2000)}} style={bs}>{cp?"Copiado":"Copiar"}</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.7}}>{result}</div></div>}
</div>)}
{tab==="sv"&&(<div>
<div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Conteúdos Salvos</h2></div>
{saved.length===0?<p style={{textAlign:"center",color:C.gold}}>Nenhum conteúdo salvo.</p>:saved.map(it=><div key={it.id} style={{background:C.white,borderRadius:10,border:"1px solid "+C.gb,padding:16,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:12}}>{it.tl} · {it.tp} · {it.dt}</span><div style={{display:"flex",gap:4}}><button onClick={()=>navigator.clipboard.writeText(it.tx)} style={bs}>Copiar</button><button onClick={()=>{const u=saved.filter(c=>c.id!==it.id);sSv(u);sS("sv",u)}} style={{...bs,color:"#c44"}}>Remover</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.5,maxHeight:160,overflow:"auto"}}>{it.tx}</div></div>)}
</div>)}
{tab==="cal"&&<AgendaTab isCon={stratOk}/>}
{showSM&&<div style={{position:"fixed",inset:0,background:"rgba(44,36,22,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:C.white,borderRadius:16,padding:"36px 28px",maxWidth:360,width:"100%",textAlign:"center"}}><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:C.brown,margin:"0 0 6px"}}>Área restrita</h3><p style={{fontSize:13,color:C.gold,marginBottom:20}}>Acesso exclusivo da consultoria</p><input type="password" value={sPw} onChange={e=>setSPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryStrat()} placeholder="Senha" style={{...ip,textAlign:"center",marginBottom:sErr?6:14}}/>{sErr&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<div style={{display:"flex",gap:8}}><button onClick={()=>{setShowSM(false);setSPw("")}} style={{...bs,flex:1}}>Cancelar</button><button onClick={tryStrat} style={{...bp,flex:1}}>Acessar</button></div></div></div>}
</div></div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
