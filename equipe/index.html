/* ═══ FIREBASE AGENDA ═══ */
const fbCol=db.collection("agenda");
function useAgenda(){
  const[entries,setEntries]=useState({});
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    const unsub=fbCol.onSnapshot(snap=>{
      const data={};snap.forEach(doc=>{data[doc.id]=doc.data().items||[]});
      setEntries(data);setLoading(false);
    });
    return ()=>unsub();
  },[]);
  const addEntry=async(key,entry)=>{const cur=entries[key]||[];const item={...entry,id:Date.now(),status:"roteirizado"};await fbCol.doc(key).set({items:[...cur,item]})};
  const updateEntry=async(key,id,updates)=>{const cur=(entries[key]||[]).map(e=>e.id===id?{...e,...updates}:e);await fbCol.doc(key).set({items:cur})};
  const deleteEntry=async(key,id)=>{const cur=(entries[key]||[]).filter(e=>e.id!==id);if(cur.length)await fbCol.doc(key).set({items:cur});else await fbCol.doc(key).delete()};
  return{entries,loading,addEntry,updateEntry,deleteEntry};
}

      {PLAN_DATA.map((p,i)=>{

          border:"1.5px solid "+(active?p.cor:C.gb),

/* Post Card com expand */
function PostCard({post,tp,pid,cor,copyText,copiedId}){
  const[open,setOpen]=useState(false);

    <button onClick={()=>setOpen(!open)} style={{

        </div>
        <div style={{background:cor+"08",borderRadius:8,padding:12,marginBottom:10,borderLeft:"3px solid "+cor}}>
          <p style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:cor,fontWeight:600,marginBottom:4}}>Call to Action</p>

          <p style={{fontSize:12,color:C.brown,lineHeight:1.6}}>{post.video}</p>
        </div>}
        <div style={{display:"flex",gap:6}}>

            ...bp,flex:1,fontSize:12,padding:"8px 12px",background:cor

          <button onClick={()=>copyText(post.cta,pid+"-cta")} style={{
            ...bs,fontSize:11,padding:"8px 12px"
          }}>{copiedId===pid+"-cta"?"✓":"Copiar CTA"}</button>

    )}

</div></div>):(
<div>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
<span style={{padding:"4px 12px",borderRadius:20,fontSize:11,fontWeight:600,background:(TYPES.find(ty=>ty.id===entry?.type)||TYPES[0]).color+"15",color:(TYPES.find(ty=>ty.id===entry?.type)||TYPES[0]).color}}>{(TYPES.find(ty=>ty.id===entry?.type)||TYPES[0]).label}</span>
<span style={{fontSize:12,color:(STS.find(s=>s.id===entry?.status)||STS[0]).color}}>{(STS.find(s=>s.id===entry?.status)||STS[0]).label}</span>
</div>
<h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown,margin:"0 0 20px"}}>{entry?.title}</h3>
{entry?.roteiro?<div style={{background:C.gl,borderRadius:12,padding:20,fontSize:13,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{entry.roteiro}</div>:<p style={{color:"#999",fontStyle:"italic"}}>Roteiro ainda não adicionado.</p>}
<div style={{marginTop:20}}><label style={lb}>Atualizar status</label><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{STS.map(s=><button key={s.id} onClick={async()=>{await onUpdate(dk,entry.id,{status:s.id})}} style={{padding:"6px 14px",borderRadius:20,fontSize:11,border:"1.5px solid "+(entry?.status===s.id?s.color:C.gb),background:entry?.status===s.id?s.color+"15":"transparent",color:entry?.status===s.id?s.color:C.brown,cursor:"pointer",fontWeight:entry?.status===s.id?600:400}}>{s.label}</button>)}</div></div>
</div>)}
</div>)}

/* Gerador IA */
function GenTab(){
const[ct,sCt]=useState("stories");const[topic,sTo]=useState(TOPS[0]);const[cTo,sCTo]=useState("");const[extra,sEx]=useState("");
const[result,sR]=useState("");const[ld,sLd]=useState(false);const[cp,sCp]=useState(false);
const gen=async()=>{sLd(true);sR("");sCp(false);const c=CTS.find(x=>x.id===ct);const t=cTo.trim()||topic;let msg=c.pr+" sobre: \""+t+"\".";if(ct==="stories")msg+="\nSequência de telas com texto, formato e orientação.";if(ct==="legenda")msg+="\nTexto completo, CTA e 15-20 hashtags.";if(ct==="temas")msg+="\n5 temas com título, relevância e formato.";if(extra.trim())msg+="\n\n"+extra;try{const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sysPr,messages:[{role:"user",content:msg}]})});const d=await r.json();sR(d.content?.map(b=>b.text||"").join("\n")||"Erro.")}catch{sR("Erro de conexão.")}sLd(false)};
return(<div>
<div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Gerador de Conteúdo</h2></div>
<label style={lb}>Formato</label><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>{CTS.map(c=><button key={c.id} onClick={()=>sCt(c.id)} style={{padding:"12px 6px",borderRadius:10,border:"1.5px solid "+(ct===c.id?C.gold:C.gb),background:ct===c.id?C.gl:C.white,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:11,fontWeight:500,color:C.brown}}>{c.label}</div></button>)}</div>
<label style={lb}>Tema</label><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{TOPS.map(t=><button key={t} onClick={()=>{sTo(t);sCTo("")}} style={{padding:"4px 10px",borderRadius:16,fontSize:10,border:"1px solid "+(topic===t&&!cTo?C.gold:C.gb),background:topic===t&&!cTo?C.gl:C.white,color:C.brown,cursor:"pointer"}}>{t}</button>)}</div>
<input value={cTo} onChange={e=>sCTo(e.target.value)} placeholder="Tema específico..." style={ip}/>
<label style={lb}>Orientações</label><textarea value={extra} onChange={e=>sEx(e.target.value)} rows={2} style={{...ip,resize:"vertical"}}/>
<button onClick={gen} disabled={ld} style={{...bp,width:"100%",opacity:ld?.7:1}}>{ld?"Gerando...":"Gerar conteúdo"}</button>
{result&&<div style={{marginTop:16,background:C.white,borderRadius:12,border:"1px solid "+C.gb,padding:18}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:500,fontSize:13}}>Resultado</span><button onClick={()=>{navigator.clipboard.writeText(result);sCp(true);setTimeout(()=>sCp(false),2000)}} style={bs}>{cp?"Copiado ✓":"Copiar"}</button></div><div style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.7}}>{result}</div></div>}
</div>)}

/* ═══ LOGIN ═══ */
function Login({onOk}){const[pw,sP]=useState("");const[er,sE]=useState(false);const go=()=>{if(pw===PW)onOk();else{sE(true);setTimeout(()=>sE(false),2000)}};return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:C.white,borderRadius:20,padding:"44px 32px",maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(44,36,22,0.1)"}}><h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:34,fontWeight:600,color:C.brown,margin:"0 0 4px"}}>M<span style={{color:C.gold}}>|</span>C</h1><p style={{fontSize:10,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:28}}>Painel da Equipe</p><input type="password" value={pw} onChange={e=>sP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Senha de acesso" style={{...ip,textAlign:"center",marginBottom:er?6:14}}/>{er&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<button onClick={go} style={{...bp,width:"100%"}}>Acessar</button></div></div>)}

/* ═══ APP PRINCIPAL ═══ */
function App(){
const[logged,setL]=useState(false);
const[tab,setTab]=useState("plan");
const[stratOk,setStrat]=useState(false);
const[sPw,setSPw]=useState("");
const[sErr,setSErr]=useState(false);
const[showSM,setShowSM]=useState(false);

const handleTab=id=>{if(id==="growth"&&!stratOk){setShowSM(true);return}setTab(id)};
const tryStrat=()=>{if(sPw===STRATPW){setStrat(true);setShowSM(false);setTab("growth");setSPw("")}else{setSErr(true);setTimeout(()=>setSErr(false),2000)}};

if(!logged)return <Login onOk={()=>setL(true)}/>;

const tabs=[
  {id:"plan",l:"Planejamento"},
  {id:"cal",l:"Agenda"},
  {id:"gen",l:"Gerador"},
  {id:"growth",l:"Estratégia",lk:true}
];

return(<div style={{minHeight:"100vh",background:C.bg}}>
<div style={{background:C.white,borderBottom:"1px solid "+C.gb,padding:"12px 16px",position:"sticky",top:0,zIndex:100}}>
  <div style={{maxWidth:840,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
    <div>
      <h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,fontWeight:600,color:C.brown,margin:0}}>M<span style={{color:C.gold}}>|</span>C</h1>
      <p style={{fontSize:9,color:C.muted,margin:0,letterSpacing:2,textTransform:"uppercase"}}>Painel da Equipe</p>
    </div>
    <div style={{display:"flex",gap:2,background:C.bg,borderRadius:9,padding:2,flexWrap:"wrap"}}>
      {tabs.map(t=><button key={t.id} onClick={()=>handleTab(t.id)} style={{
        padding:"6px 12px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,
        fontWeight:tab===t.id?600:400,
        background:tab===t.id?C.white:"transparent",
        color:tab===t.id?C.brown:C.muted
      }}>{t.l}{t.lk&&!stratOk?" ◆":""}</button>)}
    </div>
  </div>
</div>

<div style={{maxWidth:840,margin:"0 auto",padding:"18px 14px"}}>
  {tab==="plan"&&<PlanTab/>}
  {tab==="cal"&&<AgendaTab isCon={stratOk}/>}
  {tab==="gen"&&<GenTab/>}
  {tab==="growth"&&<GrowthTab/>}
</div>

{showSM&&<div style={{position:"fixed",inset:0,background:"rgba(44,36,22,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:C.white,borderRadius:16,padding:"36px 28px",maxWidth:360,width:"100%",textAlign:"center"}}><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:C.brown,margin:"0 0 6px"}}>Área restrita</h3><p style={{fontSize:13,color:C.gold,marginBottom:20}}>Acesso exclusivo da consultoria</p><input type="password" value={sPw} onChange={e=>setSPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryStrat()} placeholder="Senha" style={{...ip,textAlign:"center",marginBottom:sErr?6:14}}/>{sErr&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<div style={{display:"flex",gap:8}}><button onClick={()=>{setShowSM(false);setSPw("")}} style={{...bs,flex:1}}>Cancelar</button><button onClick={tryStrat} style={{...bp,flex:1}}>Acessar</button></div></div></div>}
</div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
