    <Sec id="vis" title="Identidade visual"><p><strong>Direção:</strong> {m.pal.m}</p><p><strong>Aplicação:</strong> {m.logo}</p></Sec>
    <Sec id="act" title="Ações e entregas">{m.act.map((a,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:4}}><span style={{color:m.col}}>—</span><span>{a}</span></div>)}</Sec>
    <Sec id="crono" title="Cronograma">{m.wk.map((w,i)=><div key={i} style={{background:i%2===0?C.gl:"transparent",borderRadius:10,padding:14,marginBottom:6}}><p style={{fontWeight:600,color:m.col,fontSize:12,marginBottom:4}}>{w.w}</p><p style={{marginBottom:2}}>{w.c}</p><p style={{fontSize:11,color:C.gold}}>Formato: {w.f}</p></div>)}</Sec>
  </div>);
}

/* Calendar */
function Cal({month,year,entries,onDay,onMo}){
  const fd=new Date(year,month,1).getDay(),dm=new Date(year,month+1,0).getDate(),ds=[];
  for(let i=0;i<fd;i++)ds.push(null);for(let j=1;j<=dm;j++)ds.push(j);
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><button onClick={()=>month===0?onMo(11,year-1):onMo(month-1,year)} style={navBtn}>←</button><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:20,color:C.brown,margin:0}}>{MO[month]} {year}</h3><button onClick={()=>month===11?onMo(0,year+1):onMo(month+1,year)} style={navBtn}>→</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>{WD.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:C.gold,fontWeight:600,padding:"3px 0"}}>{d}</div>)}{ds.map((day,i)=>{const k=day?`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`:null;const en=k?entries[k]:null;const td=day&&new Date().getDate()===day&&new Date().getMonth()===month&&new Date().getFullYear()===year;return(<div key={i} onClick={()=>day&&onDay(k)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:7,fontSize:12,background:en?C.gl:td?"rgba(201,169,110,0.06)":"transparent",border:td?`2px solid ${C.gold}`:en?`1px solid ${C.gb}`:"1px solid transparent",cursor:day?"pointer":"default",color:day?C.brown:"transparent"}}>{day||""}{en&&<div style={{width:4,height:4,borderRadius:"50%",background:C.gold,marginTop:1}}/>}</div>)})}</div></div>);
}

function EModal({dk,entry,onSave,onClose,onDel}){
  const[t,sT]=useState(entry?.title||"");const[tp,sTp]=useState(entry?.type||"stories");const[n,sN]=useState(entry?.notes||"");const[y,m,d]=dk.split("-");
  return(<div style={{position:"fixed",inset:0,background:"rgba(44,36,22,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:C.white,borderRadius:16,padding:28,maxWidth:400,width:"100%"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:18,color:C.brown,margin:0}}>{d}/{m}/{y}</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer"}}>×</button></div><label style={lbl}>Título</label><input value={t} onChange={e=>sT(e.target.value)} style={inp}/><label style={lbl}>Tipo</label><select value={tp} onChange={e=>sTp(e.target.value)} style={inp}>{CTS.map(t=><option key={t.id} value={t.id}>{t.label}</option>)}</select><label style={lbl}>Notas</label><textarea value={n} onChange={e=>sN(e.target.value)} rows={2} style={{...inp,resize:"vertical"}}/><div style={{display:"flex",gap:8}}><button onClick={()=>onSave({title:t,type:tp,notes:n})} style={{...btnP,flex:1}}>Salvar</button>{entry&&<button onClick={onDel} style={{...btnS,color:"#c44"}}>Excluir</button>}</div></div></div>);
}

/* Login */
function Login({onOk}){
  const[pw,sP]=useState("");const[er,sE]=useState(false);
  const go=()=>{if(pw===PW)onOk();else{sE(true);setTimeout(()=>sE(false),2000);}};
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{background:C.white,borderRadius:20,padding:"44px 32px",maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(44,36,22,0.1)"}}><h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:34,fontWeight:600,color:C.brown,margin:"0 0 4px"}}>M<span style={{color:C.gold}}>|</span>C</h1><p style={{fontSize:10,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:28}}>Painel Estratégico</p><input type="password" value={pw} onChange={e=>sP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Senha de acesso" style={{...inp,textAlign:"center",marginBottom:er?6:14}}/>{er&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<button onClick={go} style={{...btnP,width:"100%"}}>Acessar</button></div></div>);
}

/* Main App */
function App(){
  const[logged,setL]=useState(false);const[tab,setTab]=useState("plan");const[stratUnlocked,setStrat]=useState(false);const[stratPw,setStratPw]=useState("");const[stratErr,setStratErr]=useState(false);const[showStratModal,setShowStratModal]=useState(false);
  const[ct,sCt]=useState("stories");const[topic,sTo]=useState(TOPS[0]);const[cTo,sCTo]=useState("");const[extra,sEx]=useState("");
  const[result,sR]=useState("");const[ld,sLd]=useState(false);const[cp,sCp]=useState(false);
  const[calM,sCM2]=useState(2);const[calY,sCY]=useState(2026);
  const[calE,sCE]=useState(()=>sL("cal",{}));const[edD,sED]=useState(null);
  const[saved,sSv]=useState(()=>sL("sv",[]));const[sN2,sSN]=useState("");

  useEffect(()=>sS("cal",calE),[calE]);

  const gen=async()=>{sLd(true);sR("");sCp(false);const c=CTS.find(x=>x.id===ct);const t=cTo.trim()||topic;let msg=`${c.pr} sobre: "${t}".`;if(ct==="stories")msg+="\nSequência de telas com texto, formato e orientação visual.";if(ct==="legenda")msg+="\nTexto completo, CTA e 15-20 hashtags.";if(ct==="temas")msg+="\n5 temas com título, relevância e formato.";if(extra.trim())msg+=`\n\n${extra}`;try{const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:sysPr,messages:[{role:"user",content:msg}]})});const d=await r.json();sR(d.content?.map(b=>b.text||"").join("\n")||"Erro.");}catch{sR("Erro de conexão.");}sLd(false);};

  const handleTabClick=(id)=>{if(id==="growth"&&!stratUnlocked){setShowStratModal(true);return;}setTab(id);};

  if(!logged)return <Login onOk={()=>setL(true)}/>;
  const tabs=[{id:"growth",l:"Estratégia",locked:true},{id:"plan",l:"Planejamento"},{id:"gen",l:"Conteúdo"},{id:"sv",l:"Salvos"},{id:"cal",l:"Agenda"}];

  return(<div style={{minHeight:"100vh",background:C.bg}}>
    <div style={{background:C.white,borderBottom:`1px solid ${C.gb}`,padding:"14px 16px"}}><div style={{maxWidth:840,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div><h1 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,fontWeight:600,color:C.brown,margin:0}}>M<span style={{color:C.gold}}>|</span>C</h1><p style={{fontSize:9,color:C.gold,margin:0,letterSpacing:2,textTransform:"uppercase"}}>Painel Estratégico</p></div><div style={{display:"flex",gap:2,background:C.bg,borderRadius:9,padding:2,flexWrap:"wrap"}}>{tabs.map(t=><button key={t.id} onClick={()=>handleTabClick(t.id)} style={{padding:"6px 11px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?600:400,background:tab===t.id?C.white:"transparent",color:tab===t.id?C.brown:C.gold,position:"relative"}}>{t.l}{t.locked&&!stratUnlocked&&<span style={{marginLeft:4,fontSize:9,opacity:.5}}>◆</span>}</button>)}</div></div></div>
    <div style={{maxWidth:840,margin:"0 auto",padding:"18px 14px"}}>
      {tab==="growth"&&<GrowthTab/>}
      {tab==="plan"&&<PlanTab/>}
      {tab==="gen"&&(<div>
        <div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Gerador de Conteúdo</h2><p style={{color:C.gold,fontSize:12}}>Produção alinhada ao posicionamento da marca</p></div>
        <label style={lbl}>Formato</label><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>{CTS.map(c=><button key={c.id} onClick={()=>sCt(c.id)} style={{padding:"12px 6px",borderRadius:10,border:`1.5px solid ${ct===c.id?C.gold:C.gb}`,background:ct===c.id?C.gl:C.white,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:14,marginBottom:2,color:C.gold}}>{c.icon}</div><div style={{fontSize:11,fontWeight:500,color:C.brown}}>{c.label}</div></button>)}</div>
        <label style={lbl}>Tema</label><div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{TOPS.map(t=><button key={t} onClick={()=>{sTo(t);sCTo("");}} style={{padding:"4px 10px",borderRadius:16,fontSize:10,border:`1px solid ${topic===t&&!cTo?C.gold:C.gb}`,background:topic===t&&!cTo?C.gl:C.white,color:C.brown,cursor:"pointer"}}>{t}</button>)}</div>
        <input value={cTo} onChange={e=>sCTo(e.target.value)} placeholder="Ou insira um tema específico..." style={inp}/>
        <label style={lbl}>Orientações adicionais</label><textarea value={extra} onChange={e=>sEx(e.target.value)} rows={2} placeholder="Contexto, direcionamento..." style={{...inp,resize:"vertical"}}/>
        <button onClick={gen} disabled={ld} style={{...btnP,width:"100%",opacity:ld?.7:1}}>{ld?"Gerando...":"Gerar conteúdo"}</button>
        {result&&(<div style={{marginTop:16,background:C.white,borderRadius:12,border:`1px solid ${C.gb}`,padding:18}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><span style={{fontWeight:500,fontSize:13}}>Resultado</span><div style={{display:"flex",gap:4}}><button onClick={()=>{const c=CTS.find(x=>x.id===ct);const u=[{id:Date.now(),tl:c.label,tp:cTo.trim()||topic,tx:result,dt:new Date().toLocaleDateString("pt-BR")},...saved].slice(0,50);sSv(u);sS("sv",u);sSN("Salvo");setTimeout(()=>sSN(""),2000);}} style={btnS}>{sN2||"Salvar"}</button><button onClick={()=>{navigator.clipboard.writeText(result);sCp(true);setTimeout(()=>sCp(false),2000);}} style={btnS}>{cp?"Copiado":"Copiar"}</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:13,lineHeight:1.7}}>{result}</div></div>)}
      </div>)}
      {tab==="sv"&&(<div>
        <div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Conteúdos Salvos</h2></div>
        {saved.length===0?<p style={{textAlign:"center",color:C.gold}}>Nenhum conteúdo salvo.</p>:saved.map(it=><div key={it.id} style={{background:C.white,borderRadius:10,border:`1px solid ${C.gb}`,padding:16,marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:12}}>{it.tl} · {it.tp} · {it.dt}</span><div style={{display:"flex",gap:4}}><button onClick={()=>navigator.clipboard.writeText(it.tx)} style={btnS}>Copiar</button><button onClick={()=>{const u=saved.filter(c=>c.id!==it.id);sSv(u);sS("sv",u);}} style={{...btnS,color:"#c44"}}>Remover</button></div></div><div style={{whiteSpace:"pre-wrap",fontSize:12,lineHeight:1.5,maxHeight:160,overflow:"auto"}}>{it.tx}</div></div>)}
      </div>)}
      {tab==="cal"&&(<div>
        <div style={{textAlign:"center",marginBottom:20}}><h2 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:24,color:C.brown}}>Calendário Editorial</h2></div>
        <div style={{background:C.white,borderRadius:12,border:`1px solid ${C.gb}`,padding:18}}><Cal month={calM} year={calY} entries={calE} onDay={k=>sED(k)} onMo={(m,y)=>{sCM2(m);sCY(y);}}/></div>
        {edD&&<EModal dk={edD} entry={calE[edD]||null} onSave={d=>{sCE(p=>({...p,[edD]:d}));sED(null);}} onClose={()=>sED(null)} onDel={()=>{sCE(p=>{const n={...p};delete n[edD];return n;});sED(null);}}/>}
      </div>)}

      {showStratModal&&(<div style={{position:"fixed",inset:0,background:"rgba(44,36,22,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}><div style={{background:C.white,borderRadius:16,padding:"36px 28px",maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(44,36,22,0.15)"}}><h3 style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,color:C.brown,margin:"0 0 6px"}}>Área restrita</h3><p style={{fontSize:13,color:C.gold,marginBottom:20}}>Acesso exclusivo da consultoria</p><input type="password" value={stratPw} onChange={e=>setStratPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(stratPw==="atoz2026"){setStrat(true);setShowStratModal(false);setTab("growth");setStratPw("");}else{setStratErr(true);setTimeout(()=>setStratErr(false),2000);}}}} placeholder="Senha de acesso" style={{...inp,textAlign:"center",marginBottom:stratErr?6:14}}/>{stratErr&&<p style={{color:"#c44",fontSize:11,marginBottom:10}}>Acesso negado</p>}<div style={{display:"flex",gap:8}}><button onClick={()=>{setShowStratModal(false);setStratPw("");setStratErr(false);}} style={{...btnS,flex:1}}>Cancelar</button><button onClick={()=>{if(stratPw==="atoz2026"){setStrat(true);setShowStratModal(false);setTab("growth");setStratPw("");}else{setStratErr(true);setTimeout(()=>setStratErr(false),2000);}}} style={{...btnP,flex:1}}>Acessar</button></div></div></div>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
